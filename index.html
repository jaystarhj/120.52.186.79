<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>联合验收意见书</title>
    <style>
        html{font-size:100px}
        body,p,ul,ol,dl,li,dt,dd,h1,h2,h3,h4,h5,h6{margin:0;padding:0;list-style:none;font-size:.14rem;font-family:"Microsoft Yahei","Helvetica Neue",Helvetica,Arial,sans-serif}
        input,img{vertical-align:bottom;border:0;outline:none;margin:0;padding:0}
        html,body{height:100%;background:#f2f2f2}
        .wrap{min-height:100%;padding-bottom:.2rem;box-sizing:border-box}
        .title{font-size:.2rem;text-align:center;padding:.1rem 0;color:#333}
        .content_gcxx{margin:.1rem .05rem;border:1px solid #ccc;background:#fff}
        .content_gcxx li{padding:.08rem 0;margin:0 .05rem;border-bottom:1px solid #ccc}
        .content_gcxx li:last-child{border-bottom:none}
        .content_gcxx li p{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        span{display:inline-block;min-width:5em;word-wrap:break-word;word-break:normal}
    </style>
</head>
<body>
    <div id="content" class="wrap">

    <script>
        (function(doc,win){var e=doc.documentElement,r='orientationchange'in win?'orientationchange':'resize',c=function(){var w=e.clientWidth;if(!w)return;e.style.fontSize=w>=640?'100px':100*(w/640)+'px'};if(!doc.addEventListener)return;win.addEventListener(r,c,false);doc.addEventListener('DOMContentLoaded',c,false)})(document,window);
    </script>

</html>
